<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7cbd2">
  <meta name="description" content="Mrs. Parrish's Teacher Operating System">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.svg">
  <link rel="stylesheet" href="style.css?v=16.0.1">
  <title>Mrs. Parrish's Teacher Operating System</title>
  <meta name="teacher-os-build" content="16.0.1">
</head>
<body>
  <div id="app" class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="brand-mark">📝</div>
        <div>
          <h1>Mrs. Parrish's</h1>
          <p>TEACHER OPERATING SYSTEM ♡</p>
        </div>
      </div>
      <nav id="mainNav" class="main-nav" aria-label="Main navigation"></nav>
      <div class="sidebar-reminder">
        <span>♡</span>
        <strong>TODAY'S REMINDER</strong>
        <p>You are making a difference every single day. Keep going!</p>
      </div>
      <button id="customizeButton" class="secondary-button">⚙ Customize</button>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <button id="menuButton" class="icon-button" aria-label="Open navigation">☰</button>
        <div class="search-wrap">
          <span>⌕</span>
          <input id="globalSearch" type="search" placeholder="Search lessons, resources, students, routines...">
        </div>
        <button id="quickHealthButton" class="health-pill">✓ Health</button>
        <button id="profileButton" class="profile-pill"><span>JP</span> Mrs. Parrish</button>
      </header>

      <main id="pageHost" class="page-host" tabindex="-1"></main>

      <nav id="mobileNav" class="mobile-nav" aria-label="Mobile quick navigation">
        <button data-route="dashboard">Home</button>
        <button data-route="teachday">Today</button>
        <button data-route="lesson-plans">Plans</button>
        <button data-route="calendar">Calendar</button>
        <button data-route="health">Health</button>
      </nav>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js?v=16.0.1"></script>
</body>
</html>
